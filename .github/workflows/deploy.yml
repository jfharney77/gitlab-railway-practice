name: Lint, Validate, Test, Security, and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff -q
      - run: ruff check .
        working-directory: backend

  # ── Validate ────────────────────────────────────────────────────────────────

  validate-frontend:
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  validate-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -q
        working-directory: backend
      - run: python -c "import main; print('Backend import OK')"
        working-directory: backend

  # ── Test ────────────────────────────────────────────────────────────────────

  test-backend:
    runs-on: ubuntu-latest
    needs: validate-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -q
        working-directory: backend
      - run: pip install -r requirements-test.txt -q
        working-directory: backend
      - run: python -m pytest tests/ -v
        working-directory: backend

  # ── Security ────────────────────────────────────────────────────────────────

  security-frontend:
    runs-on: ubuntu-latest
    needs: validate-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm audit --audit-level=high
        working-directory: frontend

  security-backend:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit -q
      - run: pip-audit -r requirements.txt
        working-directory: backend

  # ── Deploy ──────────────────────────────────────────────────────────────────
  # Only runs on push to main (not on pull requests).
  # Requires RAILWAY_ACCESS_TOKEN and RAILWAY_REFRESH_TOKEN in
  # GitHub → Settings → Secrets and variables → Actions.

  deploy-backend:
    runs-on: ubuntu-latest
    needs: security-backend
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @railway/cli
      - run: mkdir -p ~/.railway
      - name: Write Railway config
        run: |
          WORKDIR=$(pwd)
          cat > ~/.railway/config.json <<EOF
          {
            "projects": {
              "$WORKDIR": {
                "projectPath": "$WORKDIR",
                "name": "clockgame",
                "project": "b90fd958-c198-46fb-a71d-13b8b56c8bc0",
                "environment": "6401324c-fad5-40f9-8457-b95c42be32de",
                "environmentName": "production",
                "service": null
              }
            },
            "user": {
              "token": null,
              "accessToken": "${{ secrets.RAILWAY_ACCESS_TOKEN }}",
              "refreshToken": "${{ secrets.RAILWAY_REFRESH_TOKEN }}",
              "tokenExpiresAt": 9999999999
            },
            "linkedFunctions": null
          }
          EOF
      - run: railway whoami
      - run: railway up --service clockgame-backend --environment production

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [security-frontend, validate-frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @railway/cli
      - run: mkdir -p ~/.railway
      - name: Write Railway config
        run: |
          WORKDIR=$(pwd)
          cat > ~/.railway/config.json <<EOF
          {
            "projects": {
              "$WORKDIR": {
                "projectPath": "$WORKDIR",
                "name": "clockgame",
                "project": "b90fd958-c198-46fb-a71d-13b8b56c8bc0",
                "environment": "6401324c-fad5-40f9-8457-b95c42be32de",
                "environmentName": "production",
                "service": null
              }
            },
            "user": {
              "token": null,
              "accessToken": "${{ secrets.RAILWAY_ACCESS_TOKEN }}",
              "refreshToken": "${{ secrets.RAILWAY_REFRESH_TOKEN }}",
              "tokenExpiresAt": 9999999999
            },
            "linkedFunctions": null
          }
          EOF
      - run: railway whoami
      - run: railway up --service clockgame-frontend --environment production
