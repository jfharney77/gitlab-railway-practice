stages:
  - validate
  - deploy

# ── Validate ──────────────────────────────────────────────────────────────────
# Runs on every push / MR so issues are caught before merge.

validate-frontend:
  stage: validate
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

validate-backend:
  stage: validate
  image: python:3.12-slim
  script:
    - cd backend
    - pip install -r requirements.txt -q
    - python -c "import main; print('Backend import OK')"

# ── Deploy ─────────────────────────────────────────────────────────────────────
# Runs only on the default branch after validation passes.
# Requires RAILWAY_ACCESS_TOKEN, RAILWAY_REFRESH_TOKEN, and RAILWAY_PROJECT_ID
# to be set in GitLab CI/CD variables.

.railway-auth: &railway-auth
  - npm install -g @railway/cli
  - mkdir -p ~/.railway
  - |
    cat > ~/.railway/config.json <<EOF
    {
      "projects": {},
      "user": {
        "token": null,
        "accessToken": "$RAILWAY_ACCESS_TOKEN",
        "refreshToken": "$RAILWAY_REFRESH_TOKEN",
        "tokenExpiresAt": 9999999999
      },
      "linkedFunctions": null
    }
    EOF
  - railway whoami

deploy-backend:
  stage: deploy
  image: node:20
  needs: [validate-backend]
  script:
    - *railway-auth
    - cd backend
    - railway up --service clockgame-backend --environment production
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-frontend:
  stage: deploy
  image: node:20
  needs: [validate-frontend]
  script:
    - *railway-auth
    - cd frontend
    - railway up --service clockgame-frontend --environment production
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
