stages:
  - validate
  - test
  - deploy

# ── Validate ──────────────────────────────────────────────────────────────────
# Runs on every push / MR so issues are caught before merge.

validate-frontend:
  stage: validate
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

validate-backend:
  stage: validate
  image: python:3.12-slim
  script:
    - cd backend
    - pip install -r requirements.txt -q
    - python -c "import main; print('Backend import OK')"

# ── Test ───────────────────────────────────────────────────────────────────────
# Runs after validate on every push. Catches logic bugs before deployment.

test-backend:
  stage: test
  image: python:3.12-slim
  needs: [validate-backend]
  script:
    - cd backend
    - pip install -r requirements.txt -q
    - pip install -r requirements-test.txt -q
    - python -m pytest tests/ -v

# ── Deploy ─────────────────────────────────────────────────────────────────────
# Runs only on the default branch after validation passes.
# Requires RAILWAY_TOKEN (project token from Railway → Settings → Tokens)
# to be set in GitLab CI/CD variables.

deploy-backend:
  stage: deploy
  image: node:20
  needs: [test-backend]
  script:
    - npm install -g @railway/cli@4.44.0
    - railway up --service clockgame-backend --environment production
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-frontend:
  stage: deploy
  image: node:20
  needs: [validate-frontend]
  script:
    - npm install -g @railway/cli@4.44.0
    - railway up --service clockgame-frontend --environment production
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
